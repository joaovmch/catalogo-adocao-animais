<section class="pagina-login">
  <div class="login-box">
    <h2>Criar conta</h2>

    @if (erro()) {
      <p class="erro-geral">{{ erro() }}</p>
    }

    <form class="formulario-login" [formGroup]="formulario" (ngSubmit)="cadastrar()">
      <label class="campo">
        <span>Nome</span>
        <input type="text" formControlName="nome" placeholder="Seu nome" />
        @if (campo.nome.invalid && (campo.nome.touched || enviado())) {
          <span class="erro">Informe o nome (mínimo 2 caracteres).</span>
        }
      </label>

      <label class="campo">
        <span>E-mail</span>
        <input type="email" formControlName="email" placeholder="seu@email.com" />
        @if (campo.email.invalid && (campo.email.touched || enviado())) {
          <span class="erro">Informe um e-mail válido.</span>
        }
      </label>

      <label class="campo">
        <span>Senha</span>
        <input type="password" formControlName="senha" placeholder="Mínimo 4 caracteres" />
        @if (campo.senha.invalid && (campo.senha.touched || enviado())) {
          <span class="erro">A senha precisa de pelo menos 4 caracteres.</span>
        }
      </label>

      <button type="submit" class="btn-salvar" [disabled]="carregando()">
        {{ carregando() ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="link-cadastro">
      Já tem conta? <a routerLink="/login">Entrar</a>
    </p>
  </div>
</section>
